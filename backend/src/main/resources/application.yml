server:
  port: 8080

spring:
  application:
    name: now-or-never-backend

  datasource:
    url: jdbc:h2:mem:now_or_never_db;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        concurrency: 1
        max-concurrency: 5

app:
  rabbitmq:
    enabled: false
    predictions-queue: now-or-never.predictions.queue
    predictions-exchange: now-or-never.predictions.exchange
    predictions-routing-key: now-or-never.predictions.routing-key

  football-data:
    api-key: ${FOOTBALL_DATA_API_KEY:coloque-sua-chave-aqui}
    base-url: https://api.football-data.org/v4
    # Competição padrão para coleta de partidas (BSA = Brasileirão Série A)
    # Opções: BSA, PL, BL1, SA, PD, FL1, PPL, DED, ELC, CL, CLI, WC, EC
    competition: BSA
