name: Auto-Update Soccer Predictions

on:
  schedule:
    # Rodar a cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Permite execução manual pela aba 'Actions' no GitHub

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Acelera instalação de dependências salvando cache do pip

      - name: Install ML Pipeline dependencies
        run: |
          cd ml-pipeline
          pip install -r requirements.txt

      - name: Run collector for Série A (bra.1)
        run: |
          cd ml-pipeline
          python src/real_time_collector.py --fallback-espn --espn-competition bra.1 --days-ahead 30

      - name: Run collector for Série B (bra.2)
        run: |
          cd ml-pipeline
          python src/real_time_collector.py --fallback-espn --espn-competition bra.2 --days-ahead 30

      - name: Sync predictions to frontend
        run: |
          cp backend/src/main/resources/predictions.json frontend/src/app/api/predictions.json

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add backend/src/main/resources/predictions.json frontend/src/app/api/predictions.json
          # Commit e push apenas se houver alterações nos arquivos json
          git diff-index --quiet HEAD || (git commit -m "chore: auto-update predictions [skip ci]" && git push)
